<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Fixture Build</title>
    <style>
      body {
        margin: 0;
        background: #1a1a2e;
        color: #e0e0e0;
        font-family: ui-monospace, monospace;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        height: 100vh;
        gap: 1rem;
      }
      h1 {
        font-size: 1.5rem;
        margin: 0;
      }
      p {
        margin: 0;
        opacity: 0.7;
        font-size: 0.875rem;
      }
      #counter {
        font-size: 2rem;
        color: #6f3fd6;
      }
      button {
        padding: 0.5rem 2rem;
        font-size: 1rem;
        background: #6f3fd6;
        color: #fff;
        border: none;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <h1>Fixture Build</h1>
    <p>This is a harmless test artifact for the sandboxed viewer.</p>
    <div id="counter">0</div>
    <button id="btn">Increment</button>
    <script>
      var count = 0;
      document.getElementById("btn").addEventListener("click", function () {
        count++;
        document.getElementById("counter").textContent = count;
      });
    </script>
  </body>
</html>
